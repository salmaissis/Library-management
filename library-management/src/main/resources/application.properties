# ==========================================
# Application
# ==========================================
spring.application.name=library-management

# ==========================================
# Datasource - PostgreSQL
# To run against PostgreSQL, make sure a database "library_db" exists
# and update the credentials below to match your environment.
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/library_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==========================================
# Swagger / OpenAPI (springdoc)
# UI available at:   http://localhost:8080/swagger-ui.html
# Spec available at: http://localhost:8080/v3/api-docs
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ==========================================
# Server
# ==========================================
server.port=8080
